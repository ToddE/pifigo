name: pifigo Builder v0.2

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., v1.0.0 or v0.0.1-manual). Used for manual runs.'
        required: true
        type: string
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'

jobs:
  build_for_release:
    name: Build & Upload for ${{ matrix.os }}/${{ matrix.go_arch }}
    runs-on: ${{ matrix.os }}

    # --- NEW: Concurrency settings for serial execution ---
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }} # Unique group for this workflow run
      max-parallel: 1 # Only allow 1 job from this group to run at a time
    # --- END NEW ---

    strategy:
      matrix:
        # Define the target architectures and OS versions for cross-compilation
        include:
          # Linux ARMv6
          - os: ubuntu-latest
            go_arch: arm
            go_arm: 6
            archive_suffix: _linux_armv6
            asset_name: pifigo_linux_armv6

          # Linux ARMv7
          - os: ubuntu-latest
            go_arch: arm
            go_arm: 7
            archive_suffix: _linux_armv7
            asset_name: pifigo_linux_armv7

          # Linux ARM64
          - os: ubuntu-latest
            go_arch: arm64
            go_arm: "" 
            archive_suffix: _linux_arm64
            asset_name: pifigo_linux_arm64
          
          # Optional: Add other targets if desired (e.g., your dev machine for testing artifact generation)
          # - os: ubuntu-latest
          #   go_arch: amd64
          #   go_arm: ""
          #   archive_suffix: _linux_amd64
          #   asset_name: pifigo_linux_amd64
          # - os: macos-latest
          #   go_arch: arm64 # Or amd64 for Intel Macs
          #   go_arm: ""
          #   archive_suffix: _darwin_arm64
          #   asset_name: pifigo_darwin_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Action to checkout your repository

      - name: Set up Go
        uses: actions/setup-go@v5 # Action to set up Go environment
        with:
          go-version: '1.24' # Use the Go version you're developing with

      - name: Make build.sh executable
        run: chmod +x build.sh # Ensure your local build script is executable

      - name: Get Release Version (Dynamic based on trigger)
        id: get_version_dynamic
        run: |
          # If triggered by a tag push, use the tag name
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=${GITHUB_REF}" >> "$GITHUB_ENV" # Store full tag for action-gh-release
          # If triggered manually via workflow_dispatch, use the input version_tag
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version_tag }}" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=${{ github.event.inputs.version_tag }}" >> "$GITHUB_ENV" # Use input as tag_name
          # Fallback for other non-release triggers (e.g., push to branch)
          else
            echo "RELEASE_VERSION=dev-build-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=dev-build-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi
          echo "Determined RELEASE_VERSION: ${{ env.RELEASE_VERSION }}"

      - name: Build pifigo for ${{ matrix.go_arch }}/${{ matrix.go_arm }}
        run: |
          if [ -n "${{ matrix.go_arm }}" ]; then
            export GOARM=${{ matrix.go_arm }}
          fi
          export GOOS=linux
          export GOARCH=${{ matrix.go_arch }}
          
          ./build.sh # build.sh reads VERSION_CLEAN which we will set from env.RELEASE_VERSION
        env: # Pass RELEASE_VERSION to build.sh via environment
          VERSION_CLEAN: ${{ env.RELEASE_VERSION }} # build.sh needs to use this env var
        working-directory: .

      - name: Prepare Release Artifact
        run: |
          APP_NAME="pifigo"
          VERSION_CLEAN="${{ env.RELEASE_VERSION }}" # Get version from previous step
          ARCHIVE_SUFFIX="${{ matrix.archive_suffix }}"
          OUTPUT_DIR="releases"

          BINARY_FILENAME="${APP_NAME}_${VERSION_CLEAN}${ARCHIVE_SUFFIX}"
          ARCHIVE_NAME="${APP_NAME}-${VERSION_CLEAN}${ARCHIVE_SUFFIX}.tar.gz"
          
          mkdir -p "./${OUTPUT_DIR}/${ARCHIVE_NAME%.tar.gz}/"
          mv "./${OUTPUT_DIR}/${BINARY_FILENAME}" "./${OUTPUT_DIR}/${ARCHIVE_NAME%.tar.gz}/${APP_NAME}"

          tar -czvf "./${OUTPUT_DIR}/${ARCHIVE_NAME}" -C "./${OUTPUT_DIR}" "${ARCHIVE_NAME%.tar.gz}"

          echo "ASSET_PATH=./${OUTPUT_DIR}/${ARCHIVE_NAME}" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"
        working-directory: .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        # Only upload if triggered by a tag push, OR if triggered manually AND the input tag starts with 'v'
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.version_tag, 'v'))
        with:
          files: ${{ env.ASSET_PATH }}
          name: Release ${{ env.RELEASE_VERSION }}
          tag_name: ${{ env.RELEASE_TAG }} # Use the dynamically determined tag
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || (github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.version_tag, '-rc') || contains(github.event.inputs.version_tag, '-beta'))) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}